name: Install Smoke

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  install-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout CLI
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps (minimal)
        run: bun install --frozen-lockfile

      - name: Run installer docker tests
        env:
          ALPHACLAW_INSTALL_URL: https://alphaclaw.ai/install.sh
          ALPHACLAW_INSTALL_CLI_URL: https://alphaclaw.ai/install-cli.sh
          ALPHACLAW_NO_ONBOARD: "1"
          ALPHACLAW_INSTALL_SMOKE_SKIP_CLI: "1"
          ALPHACLAW_INSTALL_SMOKE_SKIP_NONROOT: ${{ github.event_name == 'pull_request' && '1' || '0' }}
          ALPHACLAW_INSTALL_SMOKE_SKIP_PREVIOUS: "1"
        run: bun run --cwd packages/core test:install:smoke
