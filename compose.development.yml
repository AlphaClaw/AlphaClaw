services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: alphaclaw
      MYSQL_DATABASE: alphaclaw
      MYSQL_USER: alphaclaw
      MYSQL_PASSWORD: alphaclaw
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ualphaclaw", "-palphaclaw"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: mysql+aiomysql://alphaclaw:alphaclaw@db:3306/alphaclaw
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
    command: sh -c "uv run alembic upgrade head && uv run python -m alphaclaw"

volumes:
  db-data:
