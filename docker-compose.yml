services:
  alphaclaw-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${ALPHACLAW_IMAGE:-alphaclaw:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      ALPHACLAW_GATEWAY_TOKEN: ${ALPHACLAW_GATEWAY_TOKEN}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
      ETRADE_CONSUMER_KEY: ${ETRADE_CONSUMER_KEY}
      ETRADE_CONSUMER_SECRET: ${ETRADE_CONSUMER_SECRET}
      ETRADE_ACCESS_TOKEN: ${ETRADE_ACCESS_TOKEN}
      ETRADE_ACCESS_TOKEN_SECRET: ${ETRADE_ACCESS_TOKEN_SECRET}
      ETRADE_SANDBOX: ${ETRADE_SANDBOX:-0}
    volumes:
      - ${ALPHACLAW_CONFIG_DIR:-~/.alphaclaw}:/home/node/.alphaclaw
      - ${ALPHACLAW_WORKSPACE_DIR:-~/.alphaclaw/workspace}:/home/node/.alphaclaw/workspace
    ports:
      - "${ALPHACLAW_GATEWAY_PORT:-18789}:18789"
      - "${ALPHACLAW_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${ALPHACLAW_GATEWAY_BIND:-lan}",
        "--port",
        "18789",
      ]

  alphaclaw-cli:
    image: ${ALPHACLAW_IMAGE:-alphaclaw:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      ALPHACLAW_GATEWAY_TOKEN: ${ALPHACLAW_GATEWAY_TOKEN}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
      ETRADE_CONSUMER_KEY: ${ETRADE_CONSUMER_KEY}
      ETRADE_CONSUMER_SECRET: ${ETRADE_CONSUMER_SECRET}
      ETRADE_ACCESS_TOKEN: ${ETRADE_ACCESS_TOKEN}
      ETRADE_ACCESS_TOKEN_SECRET: ${ETRADE_ACCESS_TOKEN_SECRET}
      ETRADE_SANDBOX: ${ETRADE_SANDBOX:-0}
    volumes:
      - ${ALPHACLAW_CONFIG_DIR:-~/.alphaclaw}:/home/node/.alphaclaw
      - ${ALPHACLAW_WORKSPACE_DIR:-~/.alphaclaw/workspace}:/home/node/.alphaclaw/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
